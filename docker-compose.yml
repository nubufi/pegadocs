services:
  ui:
    build: ./UI
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  app:
    build: ./app
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=..
    env_file:
      - ./app/.env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pegadocs
      POSTGRES_PASSWORD: pegadocs
      POSTGRES_DB: pegadocs
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pegadocs"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata: