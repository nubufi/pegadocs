<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;}
    body{margin:0;background:#fbfcfe;}
    ::selection{background:#1b3a7c;color:#fff;}
    input::placeholder{color:#9aa6bd;}
    @keyframes pda-rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  </style>
</helmet>
<div style="font-family:'IBM Plex Sans',sans-serif;color:#41506b;-webkit-font-smoothing:antialiased;display:flex;min-height:100vh;" data-authwrap>

  <!-- ===== LEFT BRAND PANEL ===== -->
  <div style="flex:none;width:46%;background:#0f1d33;position:relative;overflow:hidden;display:flex;flex-direction:column;padding:44px 48px;" data-brand>
    <div style="position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.05) 1px,transparent 1px);background-size:24px 24px;opacity:.6;"></div>
    <a href="PegaDocs Site.dc.html" style="position:relative;display:flex;align-items:center;gap:11px;text-decoration:none;">
      <img src="assets/pegadocs-mark-white.png" alt="" style="width:34px;height:34px;object-fit:contain;">
      <span style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;color:#fff;letter-spacing:-.02em;">PegaDocs</span>
    </a>

    <div style="position:relative;margin-top:auto;margin-bottom:auto;">
      <div style="font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#7f93bd;letter-spacing:.06em;">{{ panel.kicker }}</div>
      <h1 style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:34px;line-height:1.15;letter-spacing:-.02em;color:#fff;margin:14px 0 0;max-width:380px;">{{ panel.title }}</h1>
      <div style="display:flex;flex-direction:column;gap:15px;margin-top:30px;max-width:360px;">
        <sc-for list="{{ panel.bullets }}" as="b" hint-placeholder-count="3">
          <div style="display:flex;gap:11px;align-items:flex-start;">
            <span style="flex:none;width:22px;height:22px;border-radius:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;color:#8fb0ee;margin-top:1px;">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </span>
            <span style="font-size:14.5px;color:#c3cfe6;line-height:1.5;">{{ b }}</span>
          </div>
        </sc-for>
      </div>
    </div>

    <div style="position:relative;display:flex;align-items:center;gap:9px;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#566688;">
      <span style="width:7px;height:7px;border-radius:50%;background:#3ad08a;"></span>
      open source · self-hosted · apache-2.0
    </div>
  </div>

  <!-- ===== RIGHT FORM ===== -->
  <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:40px 28px;min-width:0;">
    <div style="width:100%;max-width:392px;animation:pda-rise .4s ease both;" data-formkey="{{ mode }}">

      <div style="display:flex;background:#f3f6fb;border:1px solid #e7ebf3;border-radius:11px;padding:4px;margin-bottom:28px;">
        <button onClick="{{ showSignin }}" style="{{ tab.signin }}">Sign in</button>
        <button onClick="{{ showSignup }}" style="{{ tab.signup }}">Create account</button>
      </div>

      <h2 style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:26px;color:#0f1d33;margin:0;letter-spacing:-.02em;">{{ form.heading }}</h2>
      <p style="font-size:14.5px;color:#6b7890;margin:8px 0 26px;">{{ form.sub }}</p>

      <!-- OAuth -->
      <div style="display:flex;flex-direction:column;gap:10px;">
        <a href="PegaDocs Console.dc.html" style="display:flex;align-items:center;justify-content:center;gap:10px;text-decoration:none;background:#0f1d33;color:#fff;padding:12px;border-radius:10px;font-weight:600;font-size:14.5px;border:1px solid #0f1d33;">
          <svg width="17" height="17" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
          {{ form.oauth }} with GitHub
        </a>
        <a href="PegaDocs Console.dc.html" style="display:flex;align-items:center;justify-content:center;gap:10px;text-decoration:none;background:#fff;color:#0f1d33;padding:12px;border-radius:10px;font-weight:600;font-size:14.5px;border:1px solid #dbe2ee;">
          <svg width="17" height="17" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.5 12.2c0-.7-.06-1.4-.18-2.1H12v3.97h5.9a5.04 5.04 0 0 1-2.18 3.3v2.74h3.53c2.06-1.9 3.25-4.7 3.25-7.91z"/><path fill="#34A853" d="M12 23c2.94 0 5.41-.97 7.22-2.64l-3.53-2.74c-.98.66-2.23 1.05-3.69 1.05-2.84 0-5.24-1.92-6.1-4.5H2.25v2.83A10.94 10.94 0 0 0 12 23z"/><path fill="#FBBC05" d="M5.9 14.17a6.58 6.58 0 0 1 0-4.34V7H2.25a10.96 10.96 0 0 0 0 9.83z"/><path fill="#EA4335" d="M12 5.5c1.6 0 3.04.55 4.18 1.63l3.12-3.12A10.49 10.49 0 0 0 12 1 10.94 10.94 0 0 0 2.25 7L5.9 9.83C6.76 7.25 9.16 5.5 12 5.5z"/></svg>
          {{ form.oauth }} with Google
        </a>
      </div>

      <div style="display:flex;align-items:center;gap:13px;margin:22px 0;">
        <span style="flex:1;height:1px;background:#e7ebf3;"></span>
        <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#9aa6bd;">OR</span>
        <span style="flex:1;height:1px;background:#e7ebf3;"></span>
      </div>

      <!-- email form -->
      <form onSubmit="{{ onSubmit }}" style="display:flex;flex-direction:column;gap:14px;">
        <sc-if value="{{ isSignup }}" hint-placeholder-val="{{ false }}">
          <label style="display:block;">
            <span style="display:block;font-size:13px;font-weight:600;color:#33415c;margin-bottom:6px;">Full name</span>
            <input type="text" placeholder="Jane Doe" style="width:100%;padding:11px 13px;border:1px solid #dbe2ee;border-radius:10px;font-size:14.5px;font-family:'IBM Plex Sans',sans-serif;color:#0f1d33;outline:none;" style-focus="border-color:#1b3a7c;">
          </label>
        </sc-if>
        <label style="display:block;">
          <span style="display:block;font-size:13px;font-weight:600;color:#33415c;margin-bottom:6px;">Work email</span>
          <input type="email" placeholder="you@company.com" style="width:100%;padding:11px 13px;border:1px solid #dbe2ee;border-radius:10px;font-size:14.5px;font-family:'IBM Plex Sans',sans-serif;color:#0f1d33;outline:none;" style-focus="border-color:#1b3a7c;">
        </label>
        <label style="display:block;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
            <span style="font-size:13px;font-weight:600;color:#33415c;">Password</span>
            <sc-if value="{{ isSignin }}" hint-placeholder-val="{{ true }}"><a href="#" style="font-size:12.5px;color:#1b3a7c;font-weight:600;text-decoration:none;">Forgot?</a></sc-if>
          </div>
          <input type="password" placeholder="{{ form.pwPlaceholder }}" style="width:100%;padding:11px 13px;border:1px solid #dbe2ee;border-radius:10px;font-size:14.5px;font-family:'IBM Plex Sans',sans-serif;color:#0f1d33;outline:none;" style-focus="border-color:#1b3a7c;">
        </label>
        <sc-if value="{{ isSignup }}" hint-placeholder-val="{{ false }}">
          <label style="display:block;">
            <span style="display:block;font-size:13px;font-weight:600;color:#33415c;margin-bottom:6px;">Workspace</span>
            <input type="text" placeholder="acme-corp" style="width:100%;padding:11px 13px;border:1px solid #dbe2ee;border-radius:10px;font-size:14.5px;font-family:'IBM Plex Sans',sans-serif;color:#0f1d33;outline:none;" style-focus="border-color:#1b3a7c;">
          </label>
        </sc-if>

        <button type="submit" style="margin-top:6px;background:#1b3a7c;color:#fff;border:none;padding:13px;border-radius:10px;font-weight:600;font-size:15px;font-family:'IBM Plex Sans',sans-serif;cursor:pointer;box-shadow:0 8px 22px -10px rgba(27,58,124,.6);">{{ form.cta }}</button>
      </form>

      <p style="text-align:center;font-size:13px;color:#8995ad;margin-top:22px;">{{ form.footNote }}</p>
    </div>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;}}">
class Component extends DCLogic {
  state = { mode: 'signin' };

  show(mode) { this.setState({ mode }); }
  onSubmit(e) { e.preventDefault(); window.location.href = 'PegaDocs Console.dc.html'; }

  componentDidMount() {
    this.applyResponsive();
    this._r = () => this.applyResponsive();
    window.addEventListener('resize', this._r);
  }
  componentWillUnmount() { window.removeEventListener('resize', this._r); }
  applyResponsive() {
    const w = window.innerWidth;
    const wrap = document.querySelector('[data-authwrap]');
    const brand = document.querySelector('[data-brand]');
    if (wrap) wrap.style.flexDirection = w < 900 ? 'column' : 'row';
    if (brand) { brand.style.width = w < 900 ? '100%' : '46%'; brand.style.minHeight = w < 900 ? '220px' : ''; }
  }

  tabStyle(active) {
    return `flex:1;border:none;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;font-size:13.5px;font-weight:600;padding:9px;border-radius:8px;background:${active ? '#fff' : 'transparent'};color:${active ? '#0f1d33' : '#8995ad'};box-shadow:${active ? '0 1px 3px rgba(15,29,51,.1)' : 'none'};`;
  }

  renderVals() {
    const isSignup = this.state.mode === 'signup';
    const panel = isSignup
      ? { kicker: 'GET STARTED', title: 'Stand up your own knowledge base in minutes.', bullets: ['Bring your own models, vectors and data sources', 'Self-hosted — your data never leaves your network', 'Free and open source, forever'] }
      : { kicker: 'WELCOME BACK', title: 'Talk to your knowledge, on your stack.', bullets: ['Grounded answers with real source citations', 'Chat from Teams, Telegram, Slack or the web', 'One workspace across every connected source'] };
    const form = isSignup
      ? { heading: 'Create your account', sub: 'Spin up a workspace and connect your first source.', oauth: 'Sign up', cta: 'Create account', pwPlaceholder: 'At least 8 characters', footNote: 'By creating an account you agree to the Terms & Privacy Policy.' }
      : { heading: 'Sign in to PegaDocs', sub: 'Welcome back. Pick up where you left off.', oauth: 'Continue', cta: 'Sign in', pwPlaceholder: 'Your password', footNote: 'Self-hosted instance? Use your workspace SSO above.' };

    return {
      mode: this.state.mode,
      isSignup, isSignin: !isSignup,
      panel, form,
      showSignin: () => this.show('signin'),
      showSignup: () => this.show('signup'),
      onSubmit: (e) => this.onSubmit(e),
      tab: { signin: this.tabStyle(!isSignup), signup: this.tabStyle(isSignup) }
    };
  }
}
</script>
</body>
</html>
